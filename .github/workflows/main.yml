name: Build binaries

on:
  workflow_dispatch
  #schedule:
  #  - cron: '5 5 * * *'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  VMKATZ_REPO: https://github.com/nikaiw/VMkatz.git
  VMKATZ_ROOT_DIR: /tmp/vmkatz
  VMKATZ_BIN_NAME: vmkatz
  APT: sudo apt -y -qq -o=Dpkg::Use-Pty=0

defaults:
  run:
    shell: bash

jobs:
  checkout:
    runs-on: ubuntu-latest
    outputs:
      VMKATZ_PREBUILT_LATEST_TAG: ${{ steps.release_latest_tag.outputs.VMKATZ_PREBUILT_LATEST_TAG }}
      VMKATZ_CURRENT_COMMIT_ID: ${{ steps.release_commit_id.outputs.VMKATZ_CURRENT_COMMIT_ID }}
      VMKATZ_VERSION: ${{ steps.release_version.outputs.VMKATZ_VERSION }}

    steps:
      - name: Get latest release tag of this repo
        id: release_latest_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/
          VMKATZ_PREBUILT_LATEST_TAG=$(gh release list -R mycodedoesnotcompile2/VMkatz_prebuilt_binary --json tagName -L 1 --jq '.[].tagName' --exclude-drafts --exclude-pre-releases)
          echo "VMKATZ_PREBUILT_LATEST_TAG=$VMKATZ_PREBUILT_LATEST_TAG" >> $GITHUB_OUTPUT
          echo "VMKATZ_PREBUILT_LATEST_TAG=$VMKATZ_PREBUILT_LATEST_TAG" >> $GITHUB_ENV

      - name: Clone vmkatz repo and check if there is a new and uncompiled yet version
        id: release_commit_id
        run: |
          cd /tmp/
          git clone --depth=1 "$VMKATZ_REPO" vmkatz

          cd "$VMKATZ_ROOT_DIR"
          VMKATZ_CURRENT_COMMIT_ID=$(git rev-parse --short HEAD)
          #echo "VMKATZ_CURRENT_COMMIT_ID=$VMKATZ_CURRENT_COMMIT_ID" >> $GITHUB_ENV
          echo "VMKATZ_CURRENT_COMMIT_ID=$VMKATZ_CURRENT_COMMIT_ID" >> $GITHUB_OUTPUT

          # case: no new commit => abort the workflow
          if [[ $VMKATZ_PREBUILT_LATEST_TAG == $VMKATZ_CURRENT_COMMIT_ID ]]; then
            echo "[!] No new version to compile"
            exit 100
          fi

      - name: Get vmkatz version
        id: release_version_cargo_get
        uses: nicolaiunrein/cargo-get@master
        with:
          subcommand: package.version
          options: --entry "$VMKATZ_ROOT_DIR/Cargo.toml"

      - name: Set VMKATZ_VERSION build variable
        id: release_version
        run: |
          VMKATZ_VERSION=${{ steps.release_version_cargo_get.outputs.metadata }}
          echo "VMKATZ_VERSION=$VMKATZ_VERSION" >> $GITHUB_OUTPUT


##############

  build:
    needs: checkout
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: x86_64-unknown-linux-gnu
            OS: ubuntu-latest
          
          - TARGET: x86_64-unknown-linux-musl
            OS: ubuntu-latest
          
          - TARGET: aarch64-unknown-linux-gnu
            OS: ubuntu-24.04-arm
          
          - TARGET: aarch64-unknown-linux-musl
            OS: ubuntu-24.04-arm

          - TARGET: armv7-unknown-linux-gnueabihf
            OS: ubuntu-latest
          
          - TARGET: armv7-unknown-linux-musleabihf
            OS: ubuntu-latest
          
          - TARGET: arm-unknown-linux-gnueabihf
            OS: ubuntu-latest

          - TARGET: arm-unknown-linux-musleabihf
            OS: ubuntu-latest
          
          - TARGET: aarch64-apple-darwin
            OS: macos-latest

          - TARGET: x86_64-apple-darwin
            OS: macos-26-intel
          
          - TARGET: x86_64-pc-windows-msvc
            OS: windows-latest

          - TARGET: aarch64-pc-windows-msvc
            OS: windows-11-arm
            
    runs-on: ${{ matrix.OS }}

    env:
      TARGET: ${{ matrix.TARGET }}
      OS: ${{ matrix.OS }}
      CONTAINER: ${{ matrix.CONTAINER }}
      
      VMKATZ_PREBUILT_LATEST_TAG: ${{ needs.checkout.outputs.VMKATZ_PREBUILT_LATEST_TAG }}
      VMKATZ_VERSION: ${{ needs.checkout.outputs.VMKATZ_VERSION }}

    steps:
      - name: Clone vmkatz repo
        run: |
          cd /tmp/
          git clone --depth=1 "$VMKATZ_REPO" vmkatz
      
      - name: Install and configure dependencies
        run: |
          if [[ $OS =~ ^ubuntu.*$ ]]; then
            $APT update
            $APT install crossbuild-essential-armhf
          fi

          # for musl builds
          if [[ $TARGET == *"-musl"* ]]; then
            $APT install musl-tools
          fi

          # for arm targets
          if [[ $TARGET == "arm"* ]]; then
            cd "$VMKATZ_ROOT_DIR"
            cargo install --force --locked bindgen-cli
          fi

          # some additional configuration for cross-compilation on linux
          cat >>~/.cargo/config.toml <<EOF
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          [target.armv7-unknown-linux-musleabihf]
          linker = "arm-linux-gnueabihf-gcc"
          [target.arm-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          [target.arm-unknown-linux-musleabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF
      
      - name: Install rust target
        run: rustup target add $TARGET
        
      - name: Run build
        run: |
          cd $VMKATZ_ROOT_DIR
          cargo build --release --target $TARGET
      
      - name: List build information
        run: |
          OLD_VMKATZ_BIN_PATH="$VMKATZ_ROOT_DIR/target/$TARGET/release/vmkatz"

          VMKATZ_BIN_PATH="${{ runner.temp }}/$VMKATZ_BIN_NAME-$VMKATZ_VERSION-$TARGET"
          if [[ $OS =~ ^windows.*$ ]]; then
            VMKATZ_BIN_PATH="${{ runner.temp }}/$VMKATZ_BIN_NAME-$VMKATZ_VERSION-$TARGET.exe"
          fi
          VMKATZ_BIN_HASH_PATH="$VMKATZ_BIN_PATH.sha256.txt"
          
          cp -f "$OLD_VMKATZ_BIN_PATH" "$VMKATZ_BIN_PATH"
          ls -alh "$VMKATZ_BIN_PATH"
          ldd "$VMKATZ_BIN_PATH" || true
          "$VMKATZ_BIN_PATH" -V || true

          cd "$(dirname "$VMKATZ_BIN_PATH")"
          sha256sum --tag "$(basename "$VMKATZ_BIN_PATH")" | tee "$VMKATZ_BIN_HASH_PATH"
          
          echo "VMKATZ_BIN_PATH=$VMKATZ_BIN_PATH" >> $GITHUB_ENV
          echo "VMKATZ_BIN_HASH_PATH=$VMKATZ_BIN_HASH_PATH" >> $GITHUB_ENV


      - name: List VMKatz options 
        run: |
          "$VMKATZ_BIN_PATH" -h || true

      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.TARGET }}
          path: |
            ${{ env.VMKATZ_BIN_PATH }}
            ${{ env.VMKATZ_BIN_HASH_PATH }}

##############

  deploy_release:
    needs: [checkout, build]
    runs-on: ubuntu-latest
    env:
       VMKATZ_CURRENT_COMMIT_ID: ${{ needs.checkout.outputs.VMKATZ_CURRENT_COMMIT_ID }}
       VMKATZ_VERSION: ${{ needs.checkout.outputs.VMKATZ_VERSION }}
    
    steps:
     - name: Download Artifact
       uses: actions/download-artifact@v8
       with:
        pattern: binary-*
        merge-multiple: true
        path: /tmp/results

     - name: List target
       run: |
          cd "/tmp/results"
          ls -alh
  
          RELEASE_NOTES="/tmp/release_notes.txt"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> $GITHUB_ENV
          
          cat *.sha256.txt > "$RELEASE_NOTES"
          mkdir -p "/tmp/hashes"
          mv -f *.sha256.txt "/tmp/hashes/"
  
     - name: Create a new Github release
       uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe #v2.6.1
       with:
         make_latest: true
         body_path: ${{ env.RELEASE_NOTES }}
         name: version ${{ env.VMKATZ_VERSION }} - build ${{ env.VMKATZ_CURRENT_COMMIT_ID }}
         tag_name: ${{ env.VMKATZ_CURRENT_COMMIT_ID }}
         files: |
           /tmp/results/${{ env.VMKATZ_BIN_NAME }}-*
